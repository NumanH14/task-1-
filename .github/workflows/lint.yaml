name: Terraform lint pipeline
on:
  push:
branches: [main]
 pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
    name: Terraform lint
    runs-on: ubuntu-latest

steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run TFLint
        run: tflint
        
      - name: terraform format
        run: terraform fmt
    
